<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Dashboard</title>
    <!-- Chargement du design (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans selection:bg-blue-100 min-h-screen">
    
    <!-- C'est ici que l'application va s'afficher -->
    <div id="root"></div>

    <!-- Script de l'application -->
    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Icônes (SVG simplifiés) ---
        const IconBtc = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11.767 19.089c4.924.868 6.14-6.025 1.216-6.894m-1.216 6.894L5.86 18.047m5.908 1.042-.347 1.97m1.563-8.864c4.924.869 6.14-6.025 1.215-6.893m-1.215 6.893-3.94-.694m5.155-6.2L8.29 4.26m5.908 1.042.348-1.97M7.48 20.364l3.126-17.727"/></svg>;
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const IconDollar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;

        // --- Données initiales (mockées à partir de ton CSV) ---
        const initialTransactions = [
            { id: '1', date: '2026-04-23', invested: 4500.00, btc: 0.07213162, fees: 40.50, remark: '' },
            { id: '2', date: '2026-04-02', invested: 100.00, btc: 0.00181383, fees: 0.90, remark: '' },
            { id: '3', date: '2026-04-02', invested: 100.00, btc: 0.00183056, fees: 0.00, remark: '' },
            { id: '4', date: '2026-04-01', invested: 0.00, btc: 0.00030060, fees: 0.00, remark: 'Bonus parrainage' },
            { id: '5', date: '2026-03-02', invested: 100.00, btc: 0.00193493, fees: 0.90, remark: '' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [transactions, setTransactions] = useState(initialTransactions);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [currentBtcPrice, setCurrentBtcPrice] = useState(62182.33);
            const [isSyncing, setIsSyncing] = useState(false);

            // --- LIEN GOOGLE APPS SCRIPT ---
            // C'est ici que tu collera ton lien (Étape 2 du guide)
            const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-98C0wFAf1E6EG3sOUhHIFFf3DyRUPOP6-ff9b3HDjySK7ToK4ckNYfe8maHqAn8b/exec";

            const stats = useMemo(() => {
                let totalInvested = 0;
                let totalBtc = 0;
                let totalFees = 0;

                const mockHistoricalInvested = 59836.35; 
                const mockHistoricalBtc = 1.92235552;
                const mockHistoricalFees = 716.42;

                transactions.forEach(t => {
                    totalInvested += Number(t.invested);
                    totalBtc += Number(t.btc);
                    totalFees += Number(t.fees);
                });

                totalInvested += mockHistoricalInvested;
                totalBtc += mockHistoricalBtc;
                totalFees += mockHistoricalFees;

                const currentValue = totalBtc * currentBtcPrice;
                const result = currentValue - totalInvested;
                const performance = ((currentValue / totalInvested) - 1) * 100;

                return { totalInvested, totalBtc, totalFees, currentValue, result, performance };
            }, [transactions, currentBtcPrice]);

            const formatCHF = (val) => new Intl.NumberFormat('fr-CH', { style: 'currency', currency: 'CHF' }).format(val);
            const formatBTC = (val) => `${Number(val).toFixed(8)} BTC`;
            const formatDate = (dateString) => new Date(dateString).toLocaleDateString('fr-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });

            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTx = {
                    id: Date.now().toString(),
                    date: formData.get('date'),
                    invested: Number(formData.get('invested')),
                    btc: Number(formData.get('btc')),
                    fees: Number(formData.get('fees') || 0),
                    remark: formData.get('remark') || ''
                };

                setIsSyncing(true);

                try {
                    // Si l'URL n'a pas été changée, on fait juste une simulation locale
                    if (GOOGLE_WEBAPP_URL !== "TON_URL_GOOGLE_APPS_SCRIPT_ICI") {
                        await fetch(GOOGLE_WEBAPP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newTx)
                        });
                    } else {
                        // Simulation de chargement
                        await new Promise(resolve => setTimeout(resolve, 800));
                    }
                    
                    setTransactions([newTx, ...transactions]);
                    setIsModalOpen(false);
                } catch (error) {
                    console.error(error);
                    alert("Erreur de synchronisation.");
                } finally {
                    setIsSyncing(false);
                }
            };

            return (
                <div className="pb-24">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="bg-blue-600 p-2 rounded-lg text-white">
                                    <IconBtc />
                                </div>
                                <h1 className="text-xl font-medium text-gray-700 tracking-tight">Portefeuille BTC</h1>
                            </div>
                            <div className="flex items-center text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full">
                                <span className="hidden sm:inline mr-2">Cours Actuel:</span>
                                <input 
                                    type="number" 
                                    className="bg-transparent w-24 text-right outline-none text-gray-800 font-semibold"
                                    value={currentBtcPrice}
                                    onChange={(e) => setCurrentBtcPrice(Number(e.target.value))}
                                />
                                <span className="ml-1">CHF</span>
                            </div>
                        </div>
                    </header>

                    {/* Onglets */}
                    <div className="bg-white shadow-sm mb-6">
                        <div className="max-w-5xl mx-auto px-4 flex">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className={`flex-1 sm:flex-none flex items-center justify-center space-x-2 py-4 px-6 border-b-2 transition-colors ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600 font-medium' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                            >
                                <IconDashboard />
                                <span>Vue d'ensemble</span>
                            </button>
                            <button 
                                onClick={() => setActiveTab('transactions')}
                                className={`flex-1 sm:flex-none flex items-center justify-center space-x-2 py-4 px-6 border-b-2 transition-colors ${activeTab === 'transactions' ? 'border-blue-600 text-blue-600 font-medium' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                            >
                                <IconList />
                                <span>Transactions</span>
                            </button>
                        </div>
                    </div>

                    <main className="max-w-5xl mx-auto px-4">
                        {/* Tab: Dashboard */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
                                    <p className="text-sm font-medium text-gray-500 uppercase mb-1">Valeur Actuelle Totale</p>
                                    <h2 className="text-4xl sm:text-5xl font-light text-gray-900 mb-6">{formatCHF(stats.currentValue)}</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-6 border-t border-gray-100">
                                        <div>
                                            <p className="text-sm text-gray-500 mb-1">Résultat</p>
                                            <div className={`flex items-center text-xl font-medium ${stats.result >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                {stats.result >= 0 ? <IconTrendingUp /> : <IconTrendingDown />}
                                                <span className="ml-1">{stats.result >= 0 ? '+' : ''}{formatCHF(stats.result)}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-sm text-gray-500 mb-1">Performance</p>
                                            <div className={`text-xl font-medium ${stats.performance >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                {stats.performance > 0 ? '+' : ''}{stats.performance.toFixed(1)} %
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center space-x-4">
                                        <div className="p-3 bg-blue-50 text-blue-600 rounded-lg"><IconDollar /></div>
                                        <div>
                                            <p className="text-xs text-gray-500 uppercase font-medium">Total Investi</p>
                                            <p className="text-lg font-semibold">{formatCHF(stats.totalInvested)}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center space-x-4">
                                        <div className="p-3 bg-orange-50 text-orange-500 rounded-lg"><IconBtc /></div>
                                        <div className="overflow-hidden">
                                            <p className="text-xs text-gray-500 uppercase font-medium">Avoir Total</p>
                                            <p className="text-lg font-semibold truncate">{formatBTC(stats.totalBtc)}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center space-x-4">
                                        <div className="p-3 bg-gray-50 text-gray-500 rounded-lg"><IconSettings /></div>
                                        <div>
                                            <p className="text-xs text-gray-500 uppercase font-medium">Frais Totaux</p>
                                            <p className="text-lg font-semibold">{formatCHF(stats.totalFees)}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-blue-50 text-blue-800 text-sm p-4 rounded-xl flex items-start space-x-3">
                                    <div className="mt-0.5"><IconInfo /></div>
                                    <p>Les totaux affichés incluent un historique simulé ({formatCHF(64636.35)} investis). Seules les transactions récentes sont listées dans l'onglet "Transactions".</p>
                                </div>
                            </div>
                        )}

                        {/* Tab: Transactions */}
                        {activeTab === 'transactions' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-wider text-gray-500">
                                            <th className="p-4 font-medium">Date</th>
                                            <th className="p-4 font-medium text-right">Achat</th>
                                            <th className="p-4 font-medium text-right">Avoir (BTC)</th>
                                            <th className="p-4 font-medium text-right hidden sm:table-cell">Frais</th>
                                            <th className="p-4 font-medium hidden md:table-cell">Remarque</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 text-sm">
                                        {transactions.map((tx) => (
                                            <tr key={tx.id} className="hover:bg-gray-50/50">
                                                <td className="p-4 text-gray-600">{formatDate(tx.date)}</td>
                                                <td className="p-4 text-right font-medium">{formatCHF(tx.invested)}</td>
                                                <td className="p-4 text-right text-orange-600 font-medium">{formatBTC(tx.btc)}</td>
                                                <td className="p-4 text-right text-gray-500 hidden sm:table-cell">{formatCHF(tx.fees)}</td>
                                                <td className="p-4 text-gray-500 hidden md:table-cell">{tx.remark || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* Bouton Ajouter */}
                    <button 
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-2xl shadow-lg hover:bg-blue-700 transition flex items-center space-x-2 z-20"
                    >
                        <IconPlus />
                        <span className="hidden sm:inline font-medium pr-2">Ajouter</span>
                    </button>

                    {/* Modale Ajout */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setIsModalOpen(false)}>
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50">
                                    <h3 className="text-lg font-medium text-gray-800">Nouvelle transaction</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Date</label>
                                        <input required name="date" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-blue-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Investi (CHF)</label>
                                            <input required name="invested" type="number" step="0.01" min="0" placeholder="0.00" className="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-blue-500" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Avoir (BTC)</label>
                                            <input required name="btc" type="number" step="0.00000001" min="0" placeholder="0.00" className="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-blue-500" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Frais (CHF)</label>
                                        <input name="fees" type="number" step="0.01" min="0" defaultValue="0" className="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Remarque</label>
                                        <input name="remark" type="text" placeholder="Optionnel..." className="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-blue-500" />
                                    </div>
                                    <div className="pt-4 flex space-x-3">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-medium">Annuler</button>
                                        <button type="submit" disabled={isSyncing} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-xl font-medium flex justify-center items-center">
                                            {isSyncing ? "Enregistrement..." : <><span className="mr-2"><IconSave /></span> Enregistrer</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
